[tasks.doctor]
run = "sh scripts/doctor"

[tasks.test-repo]
run = """
sh tests/smoke/repo_layout.sh
sh tests/smoke/chezmoi_layout.sh
sh tests/smoke/scripts.sh
sh tests/smoke/mise.sh
"""
