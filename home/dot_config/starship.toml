add_newline = true
format = "$directory$git_branch$git_status$fill$cmd_duration$line_break$character"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[cmd_duration]
min_time = 500
format = "[$duration](dimmed yellow)"
